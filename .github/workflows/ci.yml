name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --lib -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - run: cargo +nightly fmt -- --check

  test:
    name: Guest Test
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install rzup
        run: curl -L https://risczero.com/install | bash

      - name: Install risc0 toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.risc0/bin:$PATH"
          rzup install rust
          rzup install cpp

      - name: Cache cargo-risczero
        id: cache-risczero
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-risczero
            ~/.cargo/bin/r0vm
          key: cargo-risczero-victor-feb12-af1f67c8

      - name: Install cargo-risczero from branch
        if: steps.cache-risczero.outputs.cache-hit != 'true'
        run: >
          cargo install cargo-risczero
          --git https://github.com/risc0/risc0.git
          --branch victor/feb12-af1f67c8
          --features experimental
          --force

      - name: Run guest tests
        run: cargo risczero guest test

  doc:
    name: Doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --lib --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  bench:
    name: Benchmark
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: bench

      - name: Install rzup
        run: |
          curl -L https://risczero.com/install | bash
          echo "$HOME/.risc0/bin" >> "$GITHUB_PATH"

      - name: Install risc0 toolchain
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rzup install rust
          rzup install cpp
          rzup install r0vm

      - name: Run benchmarks
        run: >
          cargo run --release --locked
          --manifest-path bench/Cargo.toml
          -- --json bench-results.json

      - name: Track benchmark results
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: risc0-crypto benchmarks
          tool: customSmallerIsBetter
          output-file-path: bench-results.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.ref == 'refs/heads/main' }}
          alert-threshold: "101%"
          fail-on-alert: true
          comment-on-alert: true
          comment-always: ${{ github.event_name == 'pull_request' }}
          summary-always: true
